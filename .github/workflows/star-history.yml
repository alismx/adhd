name: Star History snapshot

# Builds docs/star-history.svg directly from the GitHub Stargazers API
# (no third-party caching layer). Runs on every push to main plus an
# hourly cron, so the chart is always as fresh as the last workflow run.
#
# Commits are tagged with [skip ci] to avoid re-triggering the CI workflow
# on the bot's own snapshot commits.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-history-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build star history SVG from GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/build-star-chart.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet docs/star-history.svg; then
            echo "No change in chart, skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/star-history.svg
          git commit -m "chore(star-history): snapshot refresh [skip ci]"
          git push
